version: "3.8"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=production
    depends_on:
      - db
      - cache
    volumes:
      - ./app.py:/app/app.py

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
